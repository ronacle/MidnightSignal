<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Signal</title>
  <style>
    :root {
      --bg1: #0d1530;
      --bg2: #181c2f;
      --bg3: #0f1330;
      --card: rgba(24,28,47,.82);
      --border: rgba(247,247,247,.1);
      --muted: rgba(247,247,247,.62);
      --text: rgb(247,247,247);
      --blue: #6067F9;
      --blue2: #0033AD;
      --blue3: #8BA8FF;
      --bear: #2A6BFF;
      --shadow: 0 20px 80px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(42,107,255,.14), transparent 28%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
    .card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 24px;
    }
    .grid { display: grid; gap: 20px; }
    .grid-hero { grid-template-columns: 1.4fr 1fr; }
    .grid-alerts { grid-template-columns: 1fr 1fr; }
    .grid-cards, .grid-watch { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .detail-grid-6 { display: grid; gap: 12px; grid-template-columns: repeat(6, minmax(0,1fr)); }
    .detail-grid-2 { display: grid; gap: 20px; grid-template-columns: 1.15fr .85fr; }
    .detail-grid-half { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
    .row { display: flex; gap: 14px; align-items: center; justify-content: space-between; }
    .row-start { display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; }
    .title { font-size: 32px; font-weight: 700; letter-spacing: -.03em; margin: 0; }
    .subtitle { font-size: 14px; color: var(--muted); }
    .tiny { font-size: 12px; color: rgba(247,247,247,.5); }
    .caps { text-transform: uppercase; letter-spacing: .22em; font-size: 11px; color: rgba(247,247,247,.5); }
    .badge, .pill {
      display: inline-flex; align-items: center; gap: 8px;
      border-radius: 999px; padding: 8px 12px;
      border: 1px solid rgba(247,247,247,.14);
      background: rgba(247,247,247,.04);
      font-size: 12px;
      color: var(--text);
    }
    .pill.bull { background: rgba(96,103,249,.18); color: var(--blue3); border-color: rgba(96,103,249,.45); }
    .pill.bear { background: rgba(0,51,173,.16); color: var(--bear); border-color: rgba(42,107,255,.42); }
    .metric, .mini {
      border: 1px solid rgba(247,247,247,.08);
      background: rgba(247,247,247,.04);
      border-radius: 18px;
      padding: 16px;
    }
    .metric .label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: rgba(247,247,247,.55); }
    .metric .value { margin-top: 8px; font-size: 24px; font-weight: 700; }
    select, input, button { font: inherit; }
    select, input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 16px;
      border: 1px solid rgba(247,247,247,.12);
      background: rgba(247,247,247,.04);
      color: var(--text);
      outline: none;
    }
    option { color: black; }
    button {
      border: 1px solid rgba(247,247,247,.12);
      background: rgba(247,247,247,.04);
      color: var(--text);
      border-radius: 16px;
      padding: 11px 14px;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue2), var(--blue));
      border-color: rgba(96,103,249,.45);
      color: white;
    }
    .moon {
      width: 34px; height: 34px; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, var(--blue3), var(--blue2));
      position: relative; flex: 0 0 auto;
    }
    .moon::after {
      content: ""; position: absolute; inset: 0; margin: auto;
      width: 16px; height: 4px; border-radius: 999px; background: white; opacity: .85;
      top: 0; bottom: 0;
    }
    .insight {
      border: 1px solid rgba(96,103,249,.4);
      background: linear-gradient(135deg, rgba(0,51,173,.4), rgba(96,103,249,.25));
      border-radius: 28px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .alert-strip {
      border: 1px solid rgba(139,168,255,.5);
      background: rgba(96,103,249,.15);
      border-radius: 18px; padding: 12px 14px; font-size: 14px;
    }
    .list { display: grid; gap: 10px; }
    .alert-item, .search-item, .watch, .coin { width: 100%; text-align: left; }
    .alert-item, .search-item { padding: 14px; border-radius: 16px; background: rgba(247,247,247,.04); }
    .high-bull { background: rgba(96,103,249,.1); }
    .high-bear { background: rgba(0,51,173,.12); }
    .watch {
      border: 1px solid rgba(96,103,249,.35);
      background: linear-gradient(135deg, rgba(96,103,249,.16), rgba(0,51,173,.18));
      border-radius: 24px; padding: 16px;
    }
    .coin {
      border: 1px solid rgba(247,247,247,.08);
      background: rgba(24,28,47,.78);
      border-radius: 24px; padding: 18px;
      box-shadow: 0 14px 50px rgba(0,0,0,.32);
      display: grid; gap: 14px;
    }
    .coin.active { border-color: rgba(139,168,255,.65); box-shadow: 0 0 0 2px rgba(139,168,255,.18), 0 14px 50px rgba(0,0,0,.32); }
    .sparkline { width: 100%; height: 42px; display: block; }
    .progress { height: 8px; width: 100%; border-radius: 999px; background: rgba(247,247,247,.1); overflow: hidden; }
    .progress > span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue2), var(--blue), var(--blue3)); }
    .text-pos { color: var(--blue3); }
    .text-neg { color: var(--bear); }
    .footer { text-align: center; font-size: 12px; color: rgba(247,247,247,.45); }
    .hidden { display: none !important; }
    @media (max-width: 1100px) {
      .grid-hero, .grid-alerts, .detail-grid-2, .detail-grid-half { grid-template-columns: 1fr; }
      .grid-cards, .grid-watch { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .detail-grid-6 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    }
    @media (max-width: 700px) {
      .wrap { padding: 14px; }
      .grid-cards, .grid-watch, .detail-grid-6 { grid-template-columns: 1fr; }
      .row, .row-start { flex-direction: column; align-items: stretch; }
      .title { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div id="onboarding" class="hidden"></div>
  <div class="wrap" id="app"></div>

  <script>
    const seedCoins = [
      { symbol: "BTC", name: "Bitcoin", price: 112450, change24h: 2.8, volumeNum: 48.2e9 },
      { symbol: "ETH", name: "Ethereum", price: 5840, change24h: 1.1, volumeNum: 22.4e9 },
      { symbol: "SOL", name: "Solana", price: 264, change24h: 4.9, volumeNum: 6.1e9 },
      { symbol: "XRP", name: "XRP", price: 1.72, change24h: -2.3, volumeNum: 3.4e9 },
      { symbol: "ADA", name: "Cardano", price: 1.14, change24h: 0.4, volumeNum: 1.7e9 },
      { symbol: "BNB", name: "BNB", price: 935, change24h: 1.8, volumeNum: 2.3e9 },
      { symbol: "DOGE", name: "Dogecoin", price: 0.42, change24h: 3.6, volumeNum: 2.0e9 },
      { symbol: "TRX", name: "TRON", price: 0.31, change24h: 1.2, volumeNum: 890e6 },
      { symbol: "AVAX", name: "Avalanche", price: 58.2, change24h: -1.7, volumeNum: 960e6 },
      { symbol: "LINK", name: "Chainlink", price: 34.4, change24h: 2.7, volumeNum: 1.1e9 },
      { symbol: "DOT", name: "Polkadot", price: 10.7, change24h: -0.2, volumeNum: 530e6 },
      { symbol: "TON", name: "Toncoin", price: 9.3, change24h: 2.1, volumeNum: 480e6 },
      { symbol: "LTC", name: "Litecoin", price: 168, change24h: 0.6, volumeNum: 820e6 },
      { symbol: "BCH", name: "Bitcoin Cash", price: 744, change24h: 1.5, volumeNum: 710e6 },
      { symbol: "NEAR", name: "NEAR", price: 7.4, change24h: -1.3, volumeNum: 390e6 },
      { symbol: "APT", name: "Aptos", price: 19.8, change24h: 2.9, volumeNum: 620e6 },
      { symbol: "ARB", name: "Arbitrum", price: 1.94, change24h: 0.8, volumeNum: 670e6 },
      { symbol: "OP", name: "Optimism", price: 5.5, change24h: 1.9, volumeNum: 410e6 },
      { symbol: "FIL", name: "Filecoin", price: 8.7, change24h: -2.1, volumeNum: 350e6 },
      { symbol: "ATOM", name: "Cosmos", price: 14.2, change24h: 0.3, volumeNum: 440e6 }
    ];

    const TIMEFRAME_OPTIONS = ["7", "30", "90"];
    const STRATEGY_OPTIONS = ["scalp", "swing", "position"];
    const regimeOrder = { Bullish: 0, Neutral: 1, Bearish: 2 };
    const MAX_ALERTS = 10;
    const CONFLUENCE_THRESHOLD = 72;
    const HISTORY_LENGTH = 50;

    const storage = {
      get(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
      getString(key, fallback) { try { return localStorage.getItem(key) || fallback; } catch { return fallback; } },
      set(key, value) { try { localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value)); } catch {} }
    };

    function formatPrice(price) {
      if (price >= 1000) return `$${price.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      if (price >= 1) return `$${price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      return `$${price.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 })}`;
    }
    function formatVolume(num) {
      if (!Number.isFinite(num)) return '$0';
      if (num >= 1e12) return `$${(num / 1e12).toFixed(2)}T`;
      if (num >= 1e9) return `$${(num / 1e9).toFixed(2)}B`;
      if (num >= 1e6) return `$${(num / 1e6).toFixed(2)}M`;
      return `$${num.toLocaleString()}`;
    }
    function getRiskFromChange(change24h) {
      const abs = Math.abs(change24h);
      if (abs >= 6) return 'High';
      if (abs <= 2) return 'Low';
      return 'Medium';
    }
    function scoreMomentum(change24h) { return Math.max(0, Math.min(1, 0.5 + change24h / 20)); }
    function scoreTrend(rank, change24h) {
      const rankBase = rank <= 5 ? 0.72 : rank <= 10 ? 0.64 : 0.56;
      const adj = change24h > 4 ? 0.06 : change24h < -4 ? -0.06 : 0;
      return Math.max(0, Math.min(1, rankBase + adj));
    }
    function scoreVolatility(change24h) { return 1 - Math.min(1, Math.abs(change24h) / 10); }
    function calculateSignal(coin) {
      const change24h = Number(coin.change24h ?? 0);
      const rank = coin.marketCapRank ?? 999;
      const signal = scoreMomentum(change24h) * .4 + scoreTrend(rank, change24h) * .4 + scoreVolatility(change24h) * .2;
      return Math.max(.3, Math.min(.9, signal));
    }
    function deriveRegime(signal) { return signal >= .65 ? 'Bullish' : signal <= .45 ? 'Bearish' : 'Neutral'; }
    function deriveTiming(signal, change24h) {
      if (signal >= .7 && change24h > 0) return 'Enter';
      if (signal <= .4 || change24h < -2.5) return 'Reduce';
      return 'Wait';
    }
    function calculateRSI(prices, period = 14) {
      if (!prices || prices.length <= period) return 50;
      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff >= 0) gains += diff; else losses -= diff;
      }
      const avgGain = gains / period;
      const avgLoss = losses / period;
      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - 100 / (1 + rs);
    }
    function movingAverage(prices, length) {
      if (!prices || prices.length < length) return prices?.[prices.length - 1] ?? 0;
      const slice = prices.slice(-length);
      return slice.reduce((a, b) => a + b, 0) / length;
    }
    function buildSyntheticHistory(coin) {
      const endPrice = Number(coin.price ?? 0);
      const changeFactor = 1 + Number(coin.change24h ?? 0) / 100;
      const startPrice = changeFactor === 0 ? endPrice : endPrice / changeFactor;
      const arr = [];
      for (let i = 0; i < HISTORY_LENGTH; i++) {
        const progress = i / (HISTORY_LENGTH - 1);
        const baseline = startPrice + (endPrice - startPrice) * progress;
        const wave = Math.sin(progress * Math.PI * 3) * endPrice * .01;
        const wobble = Math.cos(progress * Math.PI * 5) * endPrice * .004;
        arr.push(Math.max(.0001, baseline + wave + wobble));
      }
      return arr;
    }
    function buildIndicators(coin) {
      const priceHistory = coin.priceHistory || buildSyntheticHistory(coin);
      const rsi = Math.round(calculateRSI(priceHistory));
      const ma20 = movingAverage(priceHistory, 20);
      const ma50 = movingAverage(priceHistory, 50);
      const maTrend = ma20 > ma50 ? 'Bullish' : ma20 < ma50 ? 'Bearish' : 'Neutral';
      const rsiState = rsi > 70 ? 'Overbought' : rsi < 30 ? 'Oversold' : 'Neutral';
      return { rsi, rsiState, ma20, ma50, maTrend, priceHistory };
    }
    function getBullishConfluence(coin) {
      let score = 0;
      if (coin.regime === 'Bullish') score += 24;
      if (coin.timing === 'Enter') score += 18;
      if (coin.indicators.maTrend === 'Bullish') score += 18;
      if (coin.indicators.rsi >= 45 && coin.indicators.rsi <= 68) score += 12;
      if (coin.factorScores.momentum >= 60) score += 16;
      if (coin.factorScores.volatility >= 50) score += 12;
      return Math.max(0, Math.min(100, score));
    }
    function getBearishConfluence(coin) {
      let score = 0;
      if (coin.regime === 'Bearish') score += 24;
      if (coin.timing === 'Reduce') score += 18;
      if (coin.indicators.maTrend === 'Bearish') score += 18;
      if (coin.indicators.rsi >= 62 || coin.indicators.rsiState === 'Overbought') score += 12;
      if (coin.factorScores.momentum <= 42) score += 16;
      if (coin.factorScores.volatility <= 45) score += 12;
      return Math.max(0, Math.min(100, score));
    }
    function computeOpportunityScore(coin, strategy) {
      let base = coin.signal * 100;
      const regimeBoost = coin.regime === 'Bullish' ? 12 : coin.regime === 'Neutral' ? 0 : -12;
      const timingBoost = coin.timing === 'Enter' ? 8 : coin.timing === 'Wait' ? 0 : -8;
      const riskPenalty = coin.risk === 'High' ? -4 : coin.risk === 'Low' ? 4 : 0;
      const indicatorBoost = coin.indicators.maTrend === 'Bullish' ? 4 : coin.indicators.maTrend === 'Bearish' ? -4 : 0;
      const rsi = coin.indicators.rsi;
      if (strategy === 'scalp') base += rsi < 35 ? 8 : rsi > 70 ? -6 : 0;
      if (strategy === 'position') base += coin.indicators.maTrend === 'Bullish' ? 10 : -6;
      return Math.max(0, Math.min(100, Math.round(base + regimeBoost + timingBoost + riskPenalty + indicatorBoost)));
    }
    function computeMtf(coin) {
      const short = coin.indicators.maTrend === 'Bullish' && coin.indicators.rsi < 70 ? 1 : coin.indicators.maTrend === 'Bearish' && coin.indicators.rsi > 30 ? -1 : 0;
      const medium = coin.signal >= .65 ? 1 : coin.signal <= .45 ? -1 : 0;
      const long = coin.change24h > 1 ? 1 : coin.change24h < -1 ? -1 : 0;
      const score = short + medium + long;
      let label = 'Mixed';
      if (score >= 2) label = 'Strong Bullish';
      else if (score === 1) label = 'Bullish';
      else if (score === -1) label = 'Bearish';
      else if (score <= -2) label = 'Strong Bearish';
      return { score, label };
    }
    function reasonList(coin) {
      const reasons = [];
      reasons.push('derived history mode');
      reasons.push(coin.factorScores.momentum >= 62 ? 'strong momentum' : coin.factorScores.momentum <= 42 ? 'weak momentum' : 'mixed momentum');
      reasons.push(coin.indicators.maTrend === 'Bullish' ? 'bullish MA alignment' : coin.indicators.maTrend === 'Bearish' ? 'bearish MA alignment' : 'steady trend profile');
      return reasons.slice(0, 3);
    }
    function actionInsight(coin) {
      if (coin.signal >= .74 && coin.change24h > 0 && coin.indicators.maTrend === 'Bullish') return { bias: 'Bullish', setup: 'High', action: 'Momentum and moving averages are aligned. Watch for continuation or a shallow pullback.' };
      if (coin.signal <= .42 || coin.indicators.maTrend === 'Bearish') return { bias: 'Bearish', setup: 'Defensive', action: 'Structure is weak or trend alignment is negative. Preserve capital or wait for confirmation.' };
      if (coin.indicators.rsiState === 'Oversold') return { bias: coin.regime, setup: 'Reversal Watch', action: 'Oversold conditions are forming. Look for confirmation before treating it as a recovery.' };
      return { bias: coin.regime, setup: 'Moderate', action: 'Signal is mixed. Let price and indicator alignment confirm before acting.' };
    }
    function enrich(coin, index) {
      const signal = calculateSignal({ ...coin, marketCapRank: index + 1 });
      const regime = deriveRegime(signal);
      const timing = deriveTiming(signal, coin.change24h);
      const risk = getRiskFromChange(coin.change24h);
      const indicators = buildIndicators(coin);
      const factorScores = {
        momentum: Math.round(scoreMomentum(coin.change24h) * 100),
        trend: Math.round(scoreTrend(index + 1, coin.change24h) * 100),
        volatility: Math.round(scoreVolatility(coin.change24h) * 100),
      };
      const base = { ...coin, marketCapRank: index + 1, signal, regime, timing, risk, indicators, factorScores };
      const bullish = getBullishConfluence(base);
      const bearish = getBearishConfluence(base);
      return { ...base, volume: formatVolume(coin.volumeNum), reasons: reasonList(base), mtf: computeMtf(base), opportunityScore: 0, confluence: { bullish, bearish, bullishTriggered: bullish >= CONFLUENCE_THRESHOLD, bearishTriggered: bearish >= CONFLUENCE_THRESHOLD }, actionInsight: actionInsight(base) };
    }
    function simulate(coins) {
      return coins.map((coin, i) => {
        const nextPrice = Math.max(.0001, coin.price * (1 + (Math.random() - .5) * .03));
        const nextChange = Math.max(-12, Math.min(12, coin.change24h + (Math.random() - .5) * 1.8));
        const priceHistory = [...coin.indicators.priceHistory.slice(1), nextPrice];
        return enrich({ ...coin, price: nextPrice, change24h: Number(nextChange.toFixed(1)), priceHistory }, i);
      });
    }
    function sparklineSVG(points, positive=true) {
      const stroke = positive ? '#8BA8FF' : '#2A6BFF';
      const fill = positive ? 'rgba(139,168,255,.16)' : 'rgba(42,107,255,.16)';
      const min = Math.min(...points), max = Math.max(...points), range = Math.max(max - min, .0001);
      const coords = points.map((p, i) => [ (i / Math.max(points.length - 1, 1)) * 100, 36 - ((p - min) / range) * 32 - 2 ]);
      const line = coords.map(([x,y], i) => `${i ? 'L' : 'M'}${x},${y}`).join(' ');
      const area = `${line} L 100,36 L 0,36 Z`;
      return `<svg viewBox="0 0 100 36" class="sparkline"><path d="${area}" fill="${fill}"></path><path d="${line}" fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>`;
    }

    const state = {
      showOnboarding: !storage.getString('midnight-onboarding-complete', ''),
      learnMode: true,
      timeframe: storage.getString('midnight-html-timeframe', '30'),
      strategy: storage.getString('midnight-html-strategy', 'swing'),
      watchlist: storage.get('midnight-html-watchlist', ['BTC','ETH','ADA']),
      sortBy: 'signal',
      dataMode: 'simulated',
      simulatorOn: true,
      selected: null,
      assetQuery: '',
      searchResults: [],
      alerts: [],
      watchlistAlertsOnly: true,
      lastUpdated: null,
      lastInsightSymbol: storage.getString('midnight-last-insight-html', ''),
      insightAlert: '',
      coins: seedCoins.map(enrich)
    };

    function recompute() {
      state.coins = state.coins.map((coin, i) => {
        const updated = enrich(coin, i);
        updated.opportunityScore = computeOpportunityScore(updated, state.strategy);
        return updated;
      });
      state.enhanced = state.coins.map((c) => ({ ...c, opportunityScore: computeOpportunityScore(c, state.strategy) }));
      state.bullishHighAlerts = state.enhanced.filter(c => c.signal >= .7 && c.confluence.bullish >= 70 && String(c.mtf.label).includes('Bullish')).sort((a,b) => b.opportunityScore - a.opportunityScore).slice(0,4);
      state.bearishHighAlerts = state.enhanced.filter(c => (c.signal <= .45 || c.timing === 'Reduce') && c.confluence.bearish >= 70 && String(c.mtf.label).includes('Bearish')).sort((a,b) => b.confluence.bearish - a.confluence.bearish).slice(0,4);
      state.sortedCoins = [...state.enhanced].sort((a,b) => {
        if (state.sortBy === 'signal') return b.signal - a.signal;
        if (state.sortBy === 'opportunity') return b.opportunityScore - a.opportunityScore;
        if (state.sortBy === 'name') return a.symbol.localeCompare(b.symbol);
        if (state.sortBy === 'regime') return regimeOrder[a.regime] - regimeOrder[b.regime];
        return 0;
      }).sort((a,b) => state.watchlist.includes(a.symbol) === state.watchlist.includes(b.symbol) ? 0 : state.watchlist.includes(a.symbol) ? -1 : 1);
      state.summary = {
        bullish: state.enhanced.filter(c => c.regime === 'Bullish').length,
        enter: state.enhanced.filter(c => c.timing === 'Enter').length,
        avgSignal: Math.round(state.enhanced.reduce((s,c) => s + c.signal, 0) / state.enhanced.length * 100),
        topCoin: [...state.enhanced].sort((a,b) => b.opportunityScore - a.opportunityScore)[0]
      };
      state.firstInsight = state.summary.topCoin;
      const today = new Date().toDateString();
      const storedDate = storage.getString('midnight-last-date-html', '');
      if (storedDate !== today && state.firstInsight) {
        state.insightAlert = `🌙 New daily signal: ${state.firstInsight.symbol}`;
        storage.set('midnight-last-date-html', today);
        storage.set('midnight-last-insight-html', state.firstInsight.symbol);
      } else if (state.lastInsightSymbol && state.firstInsight && state.lastInsightSymbol !== state.firstInsight.symbol) {
        state.insightAlert = `⚡ Signal changed: ${state.firstInsight.symbol} is now leading`;
        storage.set('midnight-last-insight-html', state.firstInsight.symbol);
      }
      state.lastInsightSymbol = state.firstInsight?.symbol || '';
    }

    function badge(value) {
      const cls = value === 'Bullish' || value === 'Enter' ? 'bull' : value === 'Bearish' || value === 'Reduce' ? 'bear' : 'neutral';
      return `<span class="pill ${cls}">${value}</span>`;
    }

    function renderOnboarding() {
      const el = document.getElementById('onboarding');
      if (!state.showOnboarding) { el.className = 'hidden'; el.innerHTML = ''; return; }
      el.className = '';
      el.innerHTML = `
        <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)">
          <div class="card" style="max-width:520px;width:calc(100% - 24px)">
            <div class="title" style="font-size:24px">Welcome to Midnight Signal 🌙</div>
            <p class="subtitle">This platform helps you read market conditions using signals, confluence, and multi-timeframe analysis.</p>
            <div class="grid" style="grid-template-columns:repeat(3,1fr)">
              ${STRATEGY_OPTIONS.map(s => `<button data-strategy="${s}">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}
            </div>
            <div class="tiny" style="margin-top:12px">Not sure?<br>• Scalper → quick trades (minutes/hours)<br>• Swing → days/weeks (recommended)<br>• Position → long-term trend following</div>
            <div class="row" style="margin-top:18px;justify-content:flex-end"><button class="btn-primary" id="enterDash">Enter Dashboard</button></div>
          </div>
        </div>`;
      el.querySelectorAll('[data-strategy]').forEach(btn => btn.onclick = () => { state.strategy = btn.dataset.strategy; storage.set('midnight-html-strategy', state.strategy); recompute(); render(); });
      el.querySelector('#enterDash').onclick = () => { state.showOnboarding = false; storage.set('midnight-onboarding-complete', 'true'); render(); };
    }

    function render() {
      recompute();
      renderOnboarding();
      const app = document.getElementById('app');
      const selected = state.selected ? state.enhanced.find(c => c.symbol === state.selected) : null;
      app.innerHTML = `
        <section class="card">
          <div class="row">
            <div>
              <div style="font-size:20px;font-weight:700">What’s the signal tonight? 🌙</div>
              <div class="subtitle">Surface high-probability setups instantly.</div>
            </div>
            <div style="width:min(420px,100%)">
              <input id="searchInput" value="${state.assetQuery}" placeholder="Search crypto…" />
              ${state.searchResults.length ? `<div class="grid" style="margin-top:8px">${state.searchResults.map(item => `<button class="search-item" data-add="${item.symbol}">${item.symbol} — ${item.name}</button>`).join('')}</div>` : ''}
            </div>
          </div>
        </section>

        ${(state.bullishHighAlerts.length || state.bearishHighAlerts.length) ? `
        <section class="grid grid-alerts">
          <div class="card">
            <div style="font-size:20px;font-weight:700;margin-bottom:8px">🟢 High Alert</div>
            <div class="subtitle" style="margin-bottom:12px">Bullish setups with strong signal, confluence, and multi-timeframe support. Not financial advice.</div>
            <div class="list">
              ${state.bullishHighAlerts.map(c => `<button class="alert-item high-bull" data-select="${c.symbol}">${c.symbol} — ${c.mtf.label} • ${Math.round(c.signal*100)}%</button>`).join('')}
            </div>
          </div>
          <div class="card">
            <div style="font-size:20px;font-weight:700;margin-bottom:8px">🔴 Breakdown Watch</div>
            <div class="subtitle" style="margin-bottom:12px">Bearish setups showing weakness across timing, confluence, and multi-timeframe structure. Not financial advice.</div>
            <div class="list">
              ${state.bearishHighAlerts.map(c => `<button class="alert-item high-bear" data-select="${c.symbol}">${c.symbol} — ${c.mtf.label} • ${Math.round(c.signal*100)}%</button>`).join('')}
            </div>
          </div>
        </section>` : ''}

        ${state.insightAlert ? `<section class="alert-strip">${state.insightAlert}</section>` : ''}

        ${state.firstInsight ? `
        <section class="insight">
          <div class="row">
            <div>
              <div class="caps">🌙 Tonight’s Signal</div>
              <div class="title" style="font-size:28px;margin-top:6px">${state.firstInsight.symbol} — ${state.firstInsight.mtf.label}</div>
              <div class="subtitle" style="margin-top:6px">Strategy: ${state.strategy} • Confidence: ${Math.round(state.firstInsight.signal*100)}%</div>
              <div style="margin-top:10px;font-size:14px;color:rgba(247,247,247,.76)">${state.firstInsight.reasons.join(' • ')}</div>
              <div class="tiny" style="margin-top:8px">This is a highlighted opportunity based on your strategy and multi-timeframe confluence. Not financial advice.</div>
            </div>
            <div><button class="btn-primary" data-select="${state.firstInsight.symbol}">View Details</button></div>
          </div>
        </section>` : ''}

        <section class="grid grid-hero">
          <div class="card">
            <div class="row-start">
              <div>
                <div class="caps">Midnight Signal</div>
                <div class="row" style="justify-content:flex-start;margin-top:6px">
                  <div class="moon"></div>
                  <h1 class="title">Midnight Signal</h1>
                  <button id="learnToggle">${state.learnMode ? 'Hide Help' : 'Learn Mode'}</button>
                </div>
                ${state.learnMode ? `<p class="tiny" style="margin-top:8px">While they sleep, you see it. Midnight Signal surfaces confluence, trend alignment, and signal strength across timeframes. This is edutainment, not financial advice.</p>` : ''}
                <p class="subtitle">Market Intelligence Engine — timeframe-aware signals, confluence, and strategy-driven insights.</p>
              </div>
              <div class="row" style="justify-content:flex-end;flex-wrap:wrap">
                <span class="badge">${state.timeframe}D timeframe</span>
                <span class="badge">History-aware</span>
                <span class="badge">Confluence</span>
              </div>
            </div>
            <div class="grid" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px">
              <div class="metric"><div class="label">Bullish Regimes</div><div class="value">${state.summary.bullish}/20</div></div>
              <div class="metric"><div class="label">Enter Signals</div><div class="value">${state.summary.enter}</div></div>
              <div class="metric"><div class="label">Average Confidence</div><div class="value">${state.summary.avgSignal}%</div></div>
              <div class="metric"><div class="label">Top Opportunity</div><div class="value">${state.summary.topCoin?.symbol || '—'}</div></div>
            </div>
          </div>
          <div class="card">
            <div class="row-start">
              <div>
                <div class="caps">Data Status</div>
                <div style="font-size:22px;font-weight:700;margin-top:4px">History + Live Console</div>
              </div>
              <span class="badge">${state.dataMode === 'live' ? 'Live connected' : 'Simulator mode'}</span>
            </div>
            <div class="grid" style="margin-top:14px">
              <div class="metric"><div class="label">Feed Source</div><div style="margin-top:8px;font-size:14px">${state.dataMode === 'live' ? `CoinGecko markets + ${state.timeframe}D history loading` : `Internal pulse simulator with ${state.timeframe}D persisted history`}</div></div>
              <div class="metric"><div class="label">Last Updated</div><div style="margin-top:8px;font-size:14px">${state.lastUpdated ? state.lastUpdated.toLocaleTimeString() : '—'}</div></div>
              <div class="metric"><div class="label">History State</div><div style="margin-top:8px;font-size:14px">Standalone deploy bundle</div></div>
            </div>
            <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:14px">
              <button id="simToggle">${state.simulatorOn ? 'Pause simulator' : 'Resume simulator'}</button>
              <button class="btn-primary" id="modeToggle">Switch to ${state.dataMode === 'simulated' ? 'Live' : 'Simulated'}</button>
            </div>
          </div>
        </section>

        ${state.watchlist.length ? `
        <section class="card">
          <div class="row-start">
            <div>
              <div class="row" style="justify-content:flex-start"><div style="font-size:20px;font-weight:700">Watchlist</div>${state.learnMode ? `<span class="tiny">ⓘ Track selected assets. Look for alignment across signals.</span>` : ''}</div>
              <div class="subtitle">Your pinned Midnight Signal picks, persisted on this device.</div>
            </div>
            <div class="caps">${state.watchlist.length} tracked</div>
          </div>
          <div class="grid grid-watch" style="margin-top:14px">
            ${state.enhanced.filter(c => state.watchlist.includes(c.symbol)).map(coin => `
              <button class="watch" data-select="${coin.symbol}">
                <div class="row-start" style="margin-bottom:10px">
                  <div><div style="font-size:20px;font-weight:700">${coin.symbol}</div><div class="subtitle">${coin.name}</div></div>
                  <div>${badge(coin.regime)}</div>
                </div>
                <div style="font-size:28px;font-weight:700">${formatPrice(coin.price)}</div>
                <div class="${coin.change24h >= 0 ? 'text-pos' : 'text-neg'}" style="font-size:14px;font-weight:600">${coin.change24h >= 0 ? '+' : ''}${coin.change24h.toFixed(1)}% today</div>
                <div class="mini" style="margin-top:12px">
                  <div class="tiny" style="display:flex;justify-content:space-between;margin-bottom:8px"><span>${state.timeframe}D sparkline</span><span>${coin.change24h >= 0 ? '+' : ''}${coin.change24h.toFixed(1)}%</span></div>
                  ${sparklineSVG(coin.indicators.priceHistory.slice(-18), coin.change24h >= 0)}
                </div>
              </button>`).join('')}
          </div>
        </section>` : ''}

        <section class="row-start">
          <div>
            <div class="row" style="justify-content:flex-start"><h2 style="font-size:24px;margin:0">Top 20 Opportunity Grid</h2>${state.learnMode ? `<span class="tiny">ⓘ Higher scores = stronger alignment, not certainty.</span>` : ''}</div>
            <div class="subtitle">Click a coin to open the detail panel.</div>
          </div>
          <div class="row" style="flex-wrap:wrap">
            <select id="timeframeSel">${TIMEFRAME_OPTIONS.map(v => `<option value="${v}" ${state.timeframe===v?'selected':''}>${v}D</option>`).join('')}</select>
            <select id="strategySel">${STRATEGY_OPTIONS.map(v => `<option value="${v}" ${state.strategy===v?'selected':''}>${v[0].toUpperCase()+v.slice(1)}</option>`).join('')}</select>
            <select id="sortSel">${[['signal','Top Signals'],['opportunity','Opportunity Score'],['name','Alphabetical'],['regime','Regime']].map(([v,l]) => `<option value="${v}" ${state.sortBy===v?'selected':''}>${l}</option>`).join('')}</select>
          </div>
        </section>

        <section class="grid grid-cards">
          ${state.sortedCoins.map(coin => `
            <button class="coin ${state.selected===coin.symbol?'active':''}" data-select="${coin.symbol}">
              <div class="row-start">
                <button data-watch="${coin.symbol}">${state.watchlist.includes(coin.symbol) ? '★' : '☆'}</button>
                <div><div style="font-size:20px;font-weight:700">${coin.symbol}</div><div class="subtitle">${coin.name}</div></div>
                <div>${badge(coin.regime)}</div>
              </div>
              <div>
                <div style="font-size:28px;font-weight:700">${formatPrice(coin.price)}</div>
                <div class="${coin.change24h >= 0 ? 'text-pos' : 'text-neg'}" style="font-size:14px;font-weight:600">${coin.change24h >= 0 ? '+' : ''}${coin.change24h.toFixed(1)}% (24h)</div>
              </div>
              <div>
                <div class="row"><span class="subtitle">Signal Confidence</span><span>${Math.round(coin.signal*100)}%</span></div>
                <div class="progress"><span style="width:${coin.signal*100}%"></span></div>
              </div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <div class="mini"><div class="tiny">Timing</div><div style="margin-top:8px">${badge(coin.timing)}</div></div>
                <div class="mini"><div class="tiny">Opportunity</div><div style="margin-top:8px;font-weight:700">${coin.opportunityScore}/100</div><div class="tiny" style="margin-top:4px">MTF: ${coin.mtf.label}</div></div>
              </div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <div class="mini"><div class="tiny">RSI</div><div style="margin-top:8px;font-weight:700">${coin.indicators.rsi}</div></div>
                <div class="mini"><div class="tiny">MA Trend</div><div style="margin-top:8px;font-weight:700">${coin.indicators.maTrend}</div></div>
              </div>
              <div class="grid" style="grid-template-columns:1fr 1fr">
                <div class="mini"><div class="tiny">Bullish Confluence</div><div style="margin-top:8px;font-weight:700;color:var(--blue3)">${coin.confluence.bullish}/100</div></div>
                <div class="mini"><div class="tiny">Bearish Confluence</div><div style="margin-top:8px;font-weight:700;color:var(--bear)">${coin.confluence.bearish}/100</div></div>
              </div>
              <div class="row" style="padding-top:8px;border-top:1px solid rgba(247,247,247,.08)"><div><span class="subtitle">Volume </span><span>${coin.volume}</span></div><div>${coin.risk} risk</div></div>
            </button>`).join('')}
        </section>

        ${selected ? `
          <section class="panel">
            <div class="row-start">
              <div>
                <div class="caps">Asset Detail</div>
                <div class="title" style="margin-top:6px">${selected.symbol} — ${selected.name}</div>
                <div class="row" style="justify-content:flex-start;margin-top:10px;gap:10px;font-size:14px;color:rgba(247,247,247,.68)">
                  <span style="font-size:22px;font-weight:700;color:var(--text)">${formatPrice(selected.price)}</span>
                  <span class="${selected.change24h >= 0 ? 'text-pos' : 'text-neg'}">${selected.change24h >= 0 ? '+' : ''}${selected.change24h.toFixed(1)}% today</span>
                  ${badge(selected.regime)} ${badge(selected.timing)}
                  <span class="pill">${state.timeframe}D derived history</span>
                </div>
              </div>
              <button id="closeDetail">Close panel</button>
            </div>
            <div class="detail-grid-6" style="margin-top:16px">
              <div class="metric"><div class="label">Signal Confidence</div><div class="value">${Math.round(selected.signal*100)}%</div></div>
              <div class="metric"><div class="label">Opportunity Score</div><div class="value">${selected.opportunityScore}/100</div></div>
              <div class="metric"><div class="label">Bullish Confluence</div><div class="value">${selected.confluence.bullish}/100</div></div>
              <div class="metric"><div class="label">Bearish Confluence</div><div class="value">${selected.confluence.bearish}/100</div></div>
              <div class="metric"><div class="label">24H Volume</div><div class="value">${selected.volume}</div></div>
              <div class="metric"><div class="label">Risk Profile</div><div class="value">${selected.risk}</div></div>
            </div>
            <div class="detail-grid-2" style="margin-top:20px">
              <div class="panel" style="padding:20px;background:rgba(247,247,247,.03)">
                <div class="row" style="justify-content:flex-start"><div style="font-size:14px;font-weight:700">Signal Breakdown</div></div>
                <p class="subtitle">A simple view of the factors driving this coin’s current score.</p>
                ${[['Momentum',selected.factorScores.momentum],['Trend',selected.factorScores.trend],['Volatility Control',selected.factorScores.volatility]].map(([label,val]) => `
                  <div style="margin-top:12px">
                    <div class="row"><span class="subtitle">${label}</span><span>${val}</span></div>
                    <div class="progress"><span style="width:${val}%"></span></div>
                  </div>`).join('')}
              </div>
              <div class="panel" style="padding:20px;background:rgba(247,247,247,.03)">
                <div class="row" style="justify-content:flex-start"><div style="font-size:14px;font-weight:700">Why This Signal</div></div>
                <p class="subtitle">Quick human-readable context instead of just a score.</p>
                <div class="row" style="justify-content:flex-start;flex-wrap:wrap">${selected.reasons.map(r => `<span class="pill">${r}</span>`).join('')}</div>
                <div class="metric" style="margin-top:14px"><div class="label">Action insight</div><div style="margin-top:10px;font-size:14px">Bias: <b>${selected.actionInsight.bias}</b><br>Setup Quality: <b>${selected.actionInsight.setup}</b><br><div style="margin-top:8px">${selected.actionInsight.action}</div></div></div>
              </div>
            </div>
          </section>` : ''}

        <section class="footer">
          <div style="margin-bottom:8px">Midnight Signal • Terms • Privacy • Disclaimer</div>
          <div>This application is provided for educational and informational purposes only. It does not constitute financial, investment, or trading advice. All signals, indicators, and insights are probabilistic and may be incorrect. Always perform your own research and consult a licensed financial advisor before making decisions. Use of this app is at your own risk.</div>
        </section>
      `;

      const searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.oninput = (e) => {
        state.assetQuery = e.target.value;
        const q = state.assetQuery.trim().toLowerCase();
        state.searchResults = !q ? [] : seedCoins.filter(c => c.symbol.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)).slice(0,5);
        render();
      };
      const learnToggle = document.getElementById('learnToggle'); if (learnToggle) learnToggle.onclick = () => { state.learnMode = !state.learnMode; render(); };
      const simToggle = document.getElementById('simToggle'); if (simToggle) simToggle.onclick = () => { state.simulatorOn = !state.simulatorOn; render(); };
      const modeToggle = document.getElementById('modeToggle'); if (modeToggle) modeToggle.onclick = () => { state.dataMode = state.dataMode === 'simulated' ? 'live' : 'simulated'; render(); };
      const tf = document.getElementById('timeframeSel'); if (tf) tf.onchange = (e) => { state.timeframe = e.target.value; storage.set('midnight-html-timeframe', state.timeframe); render(); };
      const st = document.getElementById('strategySel'); if (st) st.onchange = (e) => { state.strategy = e.target.value; storage.set('midnight-html-strategy', state.strategy); render(); };
      const so = document.getElementById('sortSel'); if (so) so.onchange = (e) => { state.sortBy = e.target.value; render(); };
      const closeDetail = document.getElementById('closeDetail'); if (closeDetail) closeDetail.onclick = () => { state.selected = null; render(); };

      app.querySelectorAll('[data-select]').forEach(el => el.onclick = () => { state.selected = el.dataset.select; render(); });
      app.querySelectorAll('[data-add]').forEach(el => el.onclick = () => {
        const coin = seedCoins.find(c => c.symbol === el.dataset.add);
        if (coin && !state.watchlist.includes(coin.symbol)) state.watchlist.push(coin.symbol);
        storage.set('midnight-html-watchlist', state.watchlist);
        state.assetQuery = ''; state.searchResults = []; render();
      });
      app.querySelectorAll('[data-watch]').forEach(el => el.onclick = (ev) => {
        ev.stopPropagation();
        const sym = el.dataset.watch;
        state.watchlist = state.watchlist.includes(sym) ? state.watchlist.filter(s => s !== sym) : [...state.watchlist, sym];
        storage.set('midnight-html-watchlist', state.watchlist);
        render();
      });
    }

    setInterval(() => {
      if (!state.simulatorOn || state.dataMode !== 'simulated') return;
      state.coins = simulate(state.coins);
      state.lastUpdated = new Date();
      render();
    }, 2400);

    recompute();
    render();
  </script>
</body>
</html>
